mode: halted
app:
  name: crypto-agent
  environment: local
  timezone: America/New_York
paths:
  data_dir: data
  runs_dir: runs
  journals_dir: journals
  schemas_dir: schemas
venue:
  default_venue: paper
  allowed_symbols:
    - BTCUSDT
    - ETHUSDT
  quote_currency: USDT
risk:
  max_portfolio_gross_exposure: 0.0
  max_symbol_gross_exposure: 0.0
  max_daily_realized_loss: 0.0
  max_open_positions: 0
  max_leverage: 1.0
  max_spread_bps: 0.0
  max_expected_slippage_bps: 0.0
  min_24h_quote_volume_usd: 0.0
policy:
  allow_live_orders: false
  require_manual_approval_above_notional_usd: 0.0
  kill_switch_enabled: true
